<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA WC 2026 — 100% Άχρηστοι edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap');
  :root{--bg:#0d1425;--surface:#162035;--surface2:#1e2d47;--border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);--text:#f5f8ff;--text2:#b8ccee;--text3:#7a95c0;--accent:#f0d050;--accent2:#f5a830;--green:#3ddc84;--red:#ff5f57;--blue:#5b9cf6;--radius:12px;--radius-sm:8px;--hh:66px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}

  /* ── HEADER ── */
  .header{background:linear-gradient(135deg,#0d1a3a 0%,#1a0a2e 100%);border-bottom:1px solid var(--border2);padding:0 1rem;height:var(--hh);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;}
  .logo-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .logo-img{height:42px;width:42px;border-radius:8px;object-fit:cover;display:block;}
  .logo-text{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.5px;color:var(--accent);line-height:1.1;}
  .logo-text span{color:var(--text2);font-weight:400;font-size:11px;display:block;letter-spacing:0.3px;}

  /* desktop nav */
  .nav{display:flex;gap:4px;margin-left:auto;}
  .nav button{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.5px;padding:8px 16px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap;}
  .nav button:hover{color:var(--text);background:var(--surface2);}
  .nav button.active{background:var(--accent);color:#000;border-color:var(--accent);}

  /* hamburger */
  .hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:40px;height:40px;padding:8px;margin-left:auto;background:transparent;border:1px solid var(--border2);cursor:pointer;border-radius:var(--radius-sm);flex-shrink:0;}
  .hamburger span{display:block;height:2px;background:var(--text2);border-radius:2px;transition:all .2s;}
  .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
  .hamburger.open span:nth-child(2){opacity:0;}
  .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

  /* mobile drawer */
  .mobile-nav{display:none;position:fixed;top:var(--hh);left:0;right:0;background:#0d1a3a;border-bottom:1px solid var(--border2);z-index:199;flex-direction:column;padding:.5rem;}
  .mobile-nav.open{display:flex;}
  .mobile-nav button{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.5px;padding:13px 16px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text2);cursor:pointer;text-transform:uppercase;text-align:left;width:100%;transition:all .15s;}
  .mobile-nav button.active{background:var(--accent);color:#000;}
  .mobile-nav button:hover:not(.active){background:var(--surface2);color:var(--text);}

  /* ── MAIN ── */
  .main{max-width:1040px;margin:0 auto;padding:1.75rem 1.25rem;}
  .page{display:none;}.page.active{display:block;}
  .section-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;letter-spacing:0.5px;margin-bottom:.25rem;}
  .section-sub{font-size:14px;color:var(--text);opacity:0.75;margin-bottom:1.25rem;line-height:1.6;}
  .snapshot-info{font-size:12px;color:var(--text3);text-align:right;margin-bottom:.75rem;}
  .no-snapshot{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.25);border-radius:var(--radius-sm);padding:1rem;font-size:14px;color:#ff9090;text-align:center;margin-bottom:1.5rem;line-height:1.6;}

  /* cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.4rem;margin-bottom:1rem;}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text2);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}

  /* filter bar */
  .filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem;padding:.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
  .filter-bar label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
  select{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:0 8px;height:34px;outline:none;cursor:pointer;}

  /* podium */
  .podium{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem;}
  .podium-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;display:flex;flex-direction:row;height:170px;
    transition:transform .15s;
  }
  .podium-card:hover{transform:translateY(-2px);}
  .podium-card.gold{border-color:rgba(240,208,80,0.5);background:rgba(240,208,80,0.05);}
  .podium-card.silver{border-color:rgba(180,185,200,0.4);}
  .podium-card.bronze{border-color:rgba(192,122,64,0.4);}
  .podium-img-wrap{
    width:45%;flex-shrink:0;
    background-size:contain;
    background-position:center center;
    background-repeat:no-repeat;
    background-color:#0d1425;
    position:relative;
  }
  .podium-rank-badge{
    position:absolute;top:8px;left:8px;
    font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
    padding:3px 8px;border-radius:5px;color:#000;line-height:1;
  }
  .podium-rank-badge.gold{background:var(--accent);}
  .podium-rank-badge.silver{background:#aab4c8;color:#fff;}
  .podium-rank-badge.bronze{background:#c07a40;color:#fff;}
  .podium-info{
    flex:1;padding:.85rem 1rem;
    display:flex;flex-direction:column;justify-content:center;gap:.3rem;
    min-width:0;overflow:hidden;
  }
  .podium-medal{font-size:20px;line-height:1;}
  .podium-name{
    font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;
    line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .podium-pts{
    font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;
    color:var(--accent);line-height:1;
  }
  .podium-pts-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
  /* leaderboard */

  /* leaderboard */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .lb-header{display:grid;grid-template-columns:32px 1fr 72px 72px 72px 60px;gap:4px;padding:7px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);}
  .lb-row{display:grid;grid-template-columns:32px 1fr 72px 72px 72px 60px;gap:4px;align-items:center;padding:9px 10px;border-bottom:1px solid var(--border);transition:background .1s;}
  .lb-row:last-child{border-bottom:none;}
  .lb-row:hover{background:var(--surface2);}
  .lb-rank{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:var(--text3);}
  .lb-rank.gold{color:var(--accent);}
  .lb-rank.silver{color:#aab4c8;}
  .lb-rank.bronze{color:#c07a40;}
  .lb-name{font-weight:600;font-size:15px;}
  .lb-cell{text-align:center;font-size:14px;color:var(--text2);}
  .lb-cell.total{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--accent);}

  /* match rows */
  .match-phase-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);padding:1rem 12px .4rem;}
  .match-header{display:grid;grid-template-columns:1fr 54px 54px 54px 60px;gap:3px;padding:5px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);}
  .match-row{display:grid;grid-template-columns:1fr 54px 54px 54px 60px;gap:3px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);}
  .match-row:last-child{border-bottom:none;}
  .match-row:hover{background:var(--surface2);}
  .match-teams{font-size:14px;font-weight:600;}
  .match-date{font-size:12px;color:var(--text2);margin-top:3px;font-weight:600;letter-spacing:0.3px;}
  .match-time{font-size:11px;color:var(--accent);font-weight:700;margin-top:1px;}
  .group-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--accent);background:rgba(240,208,80,0.12);border:1px solid rgba(240,208,80,0.25);border-radius:4px;padding:1px 6px;margin-top:3px;}
  .pts-cell{text-align:center;font-size:14px;color:var(--text2);}
  .pts-cell.highlight{color:var(--accent);font-weight:600;}
  .earned-badge{font-size:15px;padding:3px 9px;border-radius:5px;font-weight:700;font-family:'Barlow Condensed',sans-serif;}

  /* special events */
  .special-block{border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.75rem;}
  .special-block-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:.6rem;}
  .pick-row{display:flex;align-items:center;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:14px;}
  .pick-row:last-child{border-bottom:none;}
  .pick-name{color:var(--text);font-size:15px;}
  .pick-pts{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--text2);}
  .pick-pts.won{color:var(--green);}

  .empty{color:var(--text3);font-size:14px;text-align:center;padding:3rem 0;}

  /* ── MOBILE ── */
  @media(max-width:640px){
    .lb-header{grid-template-columns:28px 1fr 58px 58px 58px;font-size:9px;padding:6px 8px;}
    .lb-row{grid-template-columns:28px 1fr 58px 58px 58px;padding:8px 8px;gap:3px;}
    .lb-header>div:last-child,.lb-row>div:last-child{display:none;}
    .lb-cell{font-size:12px;}
    .lb-cell.total{font-size:18px;}
    .lb-name{font-size:13px;}
    .avatar-sm{width:32px;height:32px;}
    .match-header{grid-template-columns:1fr 46px 46px 46px 52px;font-size:9px;padding:5px 8px;}
    .match-row{grid-template-columns:1fr 46px 46px 46px 52px;padding:7px 8px;}
    .pts-cell{font-size:12px;}
    .match-teams{font-size:12px;}
    .match-date{font-size:11px;}
    .match-time{font-size:10px;}
    .nav{display:none;}
    .hamburger{display:flex;}
    .logo-text{font-size:15px;}
    .logo-text span{font-size:10px;}
    .main{padding:1rem .75rem;}
    .podium{grid-template-columns:1fr;gap:10px;}
    .podium-card{height:140px;}
    .podium-img-wrap{width:38%;}
    .podium-pts{font-size:26px;}
    .podium-name{font-size:17px;}
    .filter-bar{gap:6px;padding:.6rem .75rem;}
    select{font-size:12px;height:32px;}
    .section-title{font-size:22px;}
    .card{padding:.85rem 1rem;}
  }
  @media(max-width:400px){
    .metrics{grid-template-columns:1fr;}
    .metrics .metric:first-child{grid-column:auto;}
  }

  /* ── AVATARS ── */
  .avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);flex-shrink:0;}
  .avatar-sm{width:44px;height:44px;border-radius:8px;object-fit:cover;object-position:top center;border:2px solid var(--border2);flex-shrink:0;}
  .avatar-lg{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
  .player-cell{display:flex;align-items:center;gap:8px;}
  .select-opt-wrap{display:flex;align-items:center;gap:6px;}

  /* ── PLAYER BIO POPUP ── */
  .bio-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s;}
  .bio-overlay.open{opacity:1;pointer-events:all;}
  .bio-card{position:relative;width:100%;max-width:380px;min-height:280px;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6);transform:translateY(20px);transition:transform .25s;border:1px solid var(--border2);}
  .bio-overlay.open .bio-card{transform:translateY(0);}
  .bio-bg{position:absolute;inset:0;background-size:cover;background-position:top center;filter:brightness(0.28) blur(1px);transform:scale(1.05);}
  .bio-content{position:relative;z-index:2;padding:2rem 1.75rem 1.75rem;display:flex;flex-direction:column;min-height:280px;}
  .bio-close{position:absolute;top:12px;right:12px;z-index:3;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .15s;}
  .bio-close:hover{background:rgba(255,255,255,0.25);}
  .bio-player-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;margin-bottom:.25rem;text-shadow:0 2px 8px rgba(0,0,0,0.8);}
  .bio-divider{width:40px;height:3px;background:var(--accent);border-radius:2px;margin-bottom:1rem;}
  .bio-text{font-size:15px;color:rgba(255,255,255,0.88);line-height:1.7;text-shadow:0 1px 4px rgba(0,0,0,0.9);flex:1;}
  .bio-pts{margin-top:1.25rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--accent);text-shadow:0 1px 4px rgba(0,0,0,0.9);}
</style>
</head>

const BIOS = {
  "Mastoras": "(γνωστός και ως Ο Μοναδικός Άξιος Αντίπαλος, Κομισάριος των Αχρήστων)\n\nΣυνιδρυτής και admin της διοργάνωσης. Αν οι Άχρηστοι ήταν χώρα, ο Μάστορας θα ήταν πρόεδρος, πρωθυπουργός, Άδωνις Γεωργιάδης και σίγουρα Κασιδιάρης, ο οποίος θα ήθελε να απελάσει όλους τους Χατζητάδε.\n\nΑπό τους τελευταίους επιζώντες της παλιάς Alpha. Εδώ και χρόνια δηλώνει ότι «θα φύγει σύντομα», αλλά έχει πλέον ράψει καζάκα στην τράπεζα και αναμένεται να πάρει σύνταξη απευθείας από τον Τσαρμπό.\n\nΜετά την τελευταία επέμβαση οι γιατροί έχουν συστήσει να αποφεύγει το έντονο γέλιο. Για τον λόγο αυτό παρακαλείται ο Χατζητάδε να μην εμφανίζεται συχνά μπροστά του.",
  "Marosis": "(γνωστός και ως Διακογιάννης των Αχρήστων, Μπιφτεκογυριστρούλα)\n\nΕν ενεργεία πρωταθλητής και επίσημη φωνή της διοργάνωσης. Οι συμμετέχοντες κοιτάνε πρώτα το email του και μετά τη βαθμολογία.\n\nΣκληραγωγήθηκε στα δύσκολα χρόνια της Alpha, όπου καθημερινά έτρωγε το γαμήσι του Κατς ενώ ταυτόχρονα είχε συνάδελφο τον Μονόφρυδο.\n\nΈχει αφιερώσει μεγάλο μέρος της ζωής του στο να κράζει τον Χατζητάδε. Σύμφωνα με επιβεβαιωμένες πληροφορίες, έχει γράψει περισσότερες λέξεις γι' αυτόν απ' όσες έχει διαβάσει ο ίδιος ο Χατζητάδε σε ολόκληρη τη ζωή του.",
  "Roussos": "(γνωστός και ως Ο Αόρατος, Φρατζούλης)\n\nΞεκίνησε την καριέρα του στη Citibank και έκτοτε συμπεριφέρεται σαν να αποφοίτησε από το Harvard των τραπεζών. Σιγά ρε Γκούφη...\n\nΣτην Alpha απέκτησε το προσωνύμιο «Ο Αόρατος». Οι μαρτυρίες διίστανται — άλλοι υποστηρίζουν ότι δεν τον έβλεπαν γιατί δεν δούλευε, και άλλοι ότι δεν τον έβλεπαν γιατί δεν δούλευε.\n\nΤρέχει μαραθωνίους και οι κακές γλώσσες λένε ότι έχει ολοκληρώσει περισσότερα χιλιόμετρα τρέχοντας απ' όσα σωστά αποτελέσματα έχει πετύχει ο Χατζητάδε σε όλες τις διοργανώσεις μαζί.",
  "Maretis": "(γνωστός και ως Πακιστανός Τσάκας, Golden Shower της Alpha)\n\nΑποτελεί ίσως τον μοναδικό άνθρωπο στην ιστορία της Alpha που δεν παραιτήθηκε αλλά τον παρακάλεσαν να φύγει. Του έδωσαν λεφτά στο χέρι, έτοιμη δουλειά και ταξί μέχρι το νέο γραφείο.\n\nΈχει σπουδάσει μαθηματικά και αντιμετωπίζει το ποδόσφαιρο σαν διαφορική εξίσωση. Το πρόβλημα είναι ότι το ποδόσφαιρο συνεχίζει να αρνείται να συνεργαστεί μαζί του.\n\nΟι κακές γλώσσες λένε ότι διαθέτει περισσότερα πακιστανικά τηλέφωνα απ' όσες σωστές προβλέψεις έχει πετύχει ο Χατζητάδε σε όλη την καριέρα του.",
  "Stratidis": "(γνωστός και ως Εθνοσκουπίδι, Johnny Sins των Βαλκανίων)\n\nΓια χρόνια αποτέλεσε το πουτανάκι του Κατς, εκτελώντας κάθε αποστολή με πειθαρχία Βορειοκορεάτη στρατιώτη. Πλέον μεταγράφηκε στο μαγαζί του κυρ-Μίμη.\n\nΕίναι ο μοναδικός άνθρωπος που μπορεί να συμφωνήσει ταυτόχρονα με δύο άτομα που διαφωνούν μεταξύ τους. Αν τον βάλεις μόνο του σε δωμάτιο, θα καταφέρει να πάρει το μέρος και των δύο πλευρών.\n\nΗ ομοιότητά του με τον Johnny Sins δεν περνά απαρατήρητη. Η διαφορά είναι ότι ο ένας άλλαζε επαγγέλματα κάθε εβδομάδα, ενώ ο άλλος αλλάζει αφεντικά. Είναι Ηρακλής από την Τούμπα. Η ανωμαλία σε άλλο λεβελ.",
  "Voulgaris": "(γνωστός και ως Εσσιέν, Φλάβιο Κονσεϊσάο, Chief Digital Loan Expert)\n\nΜε πτυχίο τραπεζικής, η Alpha και πλέον η Snappi τράβηξαν λαχείο. Για χρόνια το έπαιζε vegan — το πρόβλημα είναι ότι τον έβλεπαν να τρώει λουκάνικα με τη συχνότητα που τα βάζει στον πάτο του ο Χατζητάδε.\n\nΧαρακτηρίστηκε κατά καιρούς ως Εσσιέν, Φλάβιο Κονσεϊσάο και Ιγκόρ Μπίσκαν. Ο ίδιος επιμένει ότι η φυσική του θέση είναι κάπου ανάμεσα στον Σαλάχ και τον Ροναλντίνιο.\n\nΟι κακές γλώσσες λένε ότι έχει σηκώσει περισσότερα Champions League με την Πανάθα στο Football Manager απ' όσα δάνεια έχει υπολογίσει σωστά στην καριέρα του.",
  "Litsas": "(γνωστός και ως Γλίτσας)\n\nΓεννήθηκε στο Αγρίνιο και παραμένει μέχρι σήμερα ο κοντύτερος άνθρωπος που έχει συμμετάσχει στη διοργάνωση. Οι πληροφορίες ότι τον μετράνε σε παλάμες αντί για εκατοστά δεν έχουν επιβεβαιωθεί.\n\nΔηλώνει κομμουνιστής αλλά εργάζεται στην Τράπεζα της Ελλάδος. Οι πολιτικοί επιστήμονες μελετούν εδώ και χρόνια το φαινόμενο χωρίς να έχουν καταλήξει σε ασφαλές συμπέρασμα.\n\nΔιατηρεί γιόγκαδικο όπου επισήμως πηγαίνει για αυτογνωσία. Ανεπισήμως φυσικά πηγαίνει για να πάρει μάτι και να επιβεβαιώσει ότι η ζωή έχει ακόμα νόημα.",
  "Pantazis": "(γνωστός και ως Ο Grandmaster των Χαμένων Ευκαιριών)\n\nΤην εποχή που στο digital έβρεχε λεφτά, ο Πανταζής κυκλοφορούσε με ομπρέλα. Αποτελεί μέχρι σήμερα μία από τις μεγαλύτερες οικονομικές τραγωδίες μετά το χρηματιστήριο του 1999.\n\nΣπούδασε στη Μπολόνια και έκτοτε το παίζει Ιταλός. Οι υπόλοιποι βέβαια θυμόμαστε ότι μεγάλωσε στην Ξάνθη, οπότε η μετάβαση από τον γκατζόλη στον Δον Κορλεόνε παραμένει μία από τις πιο απότομες μεταμορφώσεις στην ιστορία της διοργάνωσης.\n\nΑν ο Χατζητάδε είναι το σύμβολο της λανθασμένης πρόβλεψης, ο Πανταζής είναι το σύμβολο του λανθασμένου timing.",
  "Xatzitade": "(γνωστός και ως Χατζητάδε, Χατζηταδ-Air, Μπουφανοκουβαλητής)\n\nΟ άνθρωπος που κράτησε το ALT+TAB περισσότερο από οποιοδήποτε πλήκτρο στην ιστορία της ελληνικής πληροφορικής. Για χρόνια διάβαζε aek365 και με το που άκουγε βήματα επέστρεφε στο excel των πληρωμών σαν άλλος Neo στο Matrix.\n\nΈχει ταξιδέψει περισσότερα χιλιόμετρα με την πεθερά του απ' ό,τι η αποστολή της Ακτής Ελεφαντοστού. Χρωστάει ακόμα street food στον Βούλγαρη — η υπόθεση αναμένεται να εκδικαστεί στο Ευρωπαϊκό Δικαστήριο Ανθρωπίνων Δικαιωμάτων.\n\nΤόσο τσιγκούνης που αν τον κεράσεις σουβλάκι, την επόμενη μέρα θα σου ζητήσει το καλαμάκι πίσω."
};

function openBio(player, pts) {
  const av = (typeof AVATARS !== 'undefined' && AVATARS[player]) ? AVATARS[player] : '';
  document.getElementById('bio-bg').style.backgroundImage = av ? `url('${av}')` : '';
  document.getElementById('bio-name').textContent = player;
  document.getElementById('bio-text').textContent = BIOS[player] || 'Coming soon, stay tuned! 🔜';
  document.getElementById('bio-pts').textContent = pts !== undefined ? `🏆 ${pts} βαθμοί` : '';
  document.getElementById('bio-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeBio() {
  document.getElementById('bio-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeBio(); });

</script>

let data=null;
const AVATARS={
  "Mastoras":  "avatars/Mastoras.jpg",
  "Marosis":   "avatars/Marosis.jpg",
  "Roussos":   "avatars/Roussos.jpg",
  "Maretis":   "avatars/Maretis.jpg",
  "Stratidis": "avatars/Stratidis.jpg",
  "Voulgaris": "avatars/Voulgaris.jpg",
  "Litsas":    "avatars/Litsas.jpg",
  "Pantazis":  "avatars/Pantazis.jpg",
  "Xatzitade": "avatars/Xatzitade.jpg"
};
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toggleMenu(){
  const h=document.getElementById('hamburger');
  const m=document.getElementById('mobile-nav');
  h.classList.toggle('open');
  m.classList.toggle('open');
}

function showPage(p,btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav button, .mobile-nav button').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  // highlight both desktop and mobile nav buttons
  document.querySelectorAll('.nav button, .mobile-nav button').forEach(el=>{
    if(el.getAttribute('onclick')&&el.getAttribute('onclick').includes("'"+p+"'"))el.classList.add('active');
  });
  if(p==='all-preds')renderAllPreds();
  if(p==='special')renderSpecial();
  if(p==='leaderboard')renderLeaderboard();
}

function initApp(){
  data=SNAPSHOT;
  if(!data){
    document.querySelectorAll('.page').forEach(p=>{p.innerHTML='<div class="no-snapshot">No game data yet. The administrator hasn\'t published a snapshot — check back soon!</div>';});
    return;
  }
  if(data.exportedAt){const d=new Date(data.exportedAt);document.getElementById('snapshot-info').textContent='Last updated: '+d.toLocaleString();}
  const sel=document.getElementById('all-player');
  sel.innerHTML=(data.players||[]).map(p=>`<option value="${escHtml(p)}">${escHtml(p)}</option>`).join('');
  // show avatar next to select label
  const selWrap=sel.parentElement;
  if(selWrap&&!selWrap.querySelector('.sel-avatar')){
    const aImg=document.createElement('img');
    aImg.className='avatar-sm sel-avatar';
    aImg.style.cssText='display:inline-block;vertical-align:middle;margin-right:4px;';
    selWrap.insertBefore(aImg,sel);
  }
  updateSelAvatar();
  renderLeaderboard();
}
initApp();

function getPred(player,matchId,key){return(data?.predictions?.[player]?.[matchId]?.[key])||0;}
function getResult(matchId){return data?.results?.[matchId]||null;}

function calcPoints(player){
  if(!data) return {matchPts:0,specialPts:0,total:0,played:0,n5:0,n4:0,n3:0,n2:0,n1:0};
  let matchPts=0, specialPts=0;
  // Count earned points per score value for tiebreaker
  const nara=[0,0,0,0,0,0]; // index 0=0pts, 1=1pt, ... 5=5pts earned
  MATCHES.forEach(m=>{
    const r=getResult(m.id);
    if(!r||!r.outcome) return;
    const earned=getPred(player,m.id,r.outcome);
    matchPts+=earned;
    if(earned>=0 && earned<=5) nara[earned]++;
  });
  const sp=data.special?.[player];
  if(sp && data.results){
    const scorer=(data.results._scorer||'').toLowerCase().trim();
    if(scorer) sp.scorer.forEach(x=>{if((x.pick||'').toLowerCase().trim()===scorer)specialPts+=(+x.pts||0);});
    const winner=(data.results._winner||'').toLowerCase().trim();
    if(winner) sp.winner.forEach(x=>{if((x.pick||'').toLowerCase().trim()===winner)specialPts+=(+x.pts||0);});
  }
  const played=MATCHES.filter(m=>getResult(m.id)?.outcome).length;
  return{matchPts,specialPts,total:matchPts+specialPts,played,
    n5:nara[5],n4:nara[4],n3:nara[3],n2:nara[2],n1:nara[1]};
}


function renderLeaderboard(){
  const el=document.getElementById('leaderboard-content');
  if(!el) return;
  if(!data){el.innerHTML='<div class="no-snapshot">No data yet.</div>';return;}
  
  const rows=(data.players||[]).map(p=>{const c=calcPoints(p);return{player:p,...c};}).sort((a,b)=>{
    if(b.total!==a.total) return b.total-a.total;
    if(b.n5!==a.n5) return b.n5-a.n5;
    if(b.n4!==a.n4) return b.n4-a.n4;
    if(b.n3!==a.n3) return b.n3-a.n3;
    if(b.n2!==a.n2) return b.n2-a.n2;
    return b.n1-a.n1;
  });
  const played=rows[0]?.played||0;
  
  const topThree = rows.slice(0, 3);
  let metricsHtml = '';
  if(topThree.length > 0) {
    const medals = ['gold','silver','bronze'];
    const medalEmoji = ['🥇','🥈','🥉'];
    metricsHtml = `<div class="podium">` + topThree.map((r,i)=>{
      const av = (typeof AVATARS !== 'undefined' && AVATARS[r.player]) ? AVATARS[r.player] : '';
      const bgStyle = av ? `background-image:url('${av}')` : 'background:var(--surface2)';
      return `<div class="podium-card ${medals[i]}">
        <div class="podium-img-wrap" style="${bgStyle}">
          <div class="podium-rank-badge ${medals[i]}">${i+1}</div>
        </div>
        <div class="podium-info">
          <div class="podium-medal">${medalEmoji[i]}</div>
          <div class="podium-name">${escHtml(r.player)}</div>
          <div class="podium-pts">${r.total}</div>
          <div class="podium-pts-label">βαθμοί</div>
        </div>
      </div>`;
    }).join('') + `</div>`;
  }

  let html=`<div style="font-size:12px;color:var(--text2);margin-bottom:1rem">${played} of ${MATCHES.length} matches played</div>
  ${metricsHtml}
  <div class="card" style="padding:0;overflow:hidden"><div class="table-scroll">
  <div class="lb-header"><div>#</div><div>Player</div><div style="text-align:center">Match pts</div><div style="text-align:center">Special pts</div><div style="text-align:center">Total</div><div style="text-align:center">Avg</div></div>`;
  
  rows.forEach((r,i)=>{
    const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const avg=played>0?(r.matchPts/played).toFixed(2):'-';
    const av=(typeof AVATARS !== 'undefined' && AVATARS[r.player])?`<img class="avatar-sm" src="${AVATARS[r.player]}" alt="">`:'';
    html+=`<div class="lb-row"><div class="lb-rank ${rc}">${i+1}</div><div class="player-cell">${av}<span class="lb-name" style="cursor:pointer;text-decoration:underline;text-decoration-color:rgba(240,208,80,0.4);text-underline-offset:3px;" onclick="openBio('${escHtml(r.player)}',${r.total})">${escHtml(r.player)}</span></div><div class="lb-cell">${r.matchPts}</div><div class="lb-cell">${r.specialPts}</div><div class="lb-cell total">${r.total}</div><div class="lb-cell">${avg}</div></div>`;
  });
  html+='</div></div>';
  el.innerHTML=html;
}


function updateSelAvatar(){
  const sel=document.getElementById('all-player');
  const img=sel?.parentElement?.querySelector('.sel-avatar');
  if(img&&sel){img.src=AVATARS[sel.value]||'';img.style.display=AVATARS[sel.value]?'inline-block':'none';}
}
function renderAllPreds(){
  const el=document.getElementById('all-preds-content');
  if(!el) return;
  if(!data){el.innerHTML='<div class="no-snapshot" style="margin:1rem">No data yet.</div>';return;}
  const player=document.getElementById('all-player')?.value;
  const phase=document.getElementById('all-phase')?.value||'all';
  if(!player){el.innerHTML='<p class="empty">No players found.</p>';return;}
  const filtered=MATCHES.filter(m=>phase==='all'||m.phase===phase);
  // Sort chronologically by date then time (ignore group)
  const monthOrder={'Jun':6,'Jul':7};
  filtered.sort((a,b)=>{
    const parseDate=(m)=>{
      const [mon,day]=(m.date||'Jun 1').split(' ');
      const [h,min]=(m.time||'23:59').split(':');
      return (monthOrder[mon]||6)*100000 + parseInt(day)*1440 + parseInt(h)*60 + parseInt(min);
    };
    return parseDate(a)-parseDate(b);
  });
  let html=''; let lastPhase='';
  filtered.forEach(m=>{
    if(m.phase !== lastPhase){
      if(lastPhase) html+='</div>';
      html+=`<div class="match-phase-label">${m.phase==='Group stage'?'Group Stage':m.phase}</div>
      <div class="match-header"><div>Match</div><div style="text-align:center">Home</div><div style="text-align:center">Draw</div><div style="text-align:center">Away</div><div style="text-align:center">Earned</div></div><div>`;
      lastPhase=m.phase;
    }
    const w1=getPred(player,m.id,'w1'),dr=getPred(player,m.id,'draw'),w2=getPred(player,m.id,'w2');
    const r=getResult(m.id);
    const outcome=r?.outcome||null;
    const earned=outcome?getPred(player,m.id,outcome):null;
    const hi=(k)=>outcome===k?' highlight':'';
    const grpBadge=m.group?`<span class="group-badge">Grp ${m.group}</span>`:'';
    const timeStr=m.time?`<div class="match-time">⏱ ${m.time}</div>`:'';
    html+=`<div class="match-row">
      <div>
        <div class="match-teams">${escHtml(m.t1)} vs ${escHtml(m.t2)}</div>
        <div class="match-date">${m.date} ${grpBadge}</div>
        ${timeStr}
      </div>
      <div class="pts-cell${hi('w1')}">${w1}</div>
      <div class="pts-cell${hi('draw')}">${dr}</div>
      <div class="pts-cell${hi('w2')}">${w2}</div>
      <div style="text-align:center">${earned!==null?`<span class="earned-badge" style="${
        earned===5?'background:rgba(61,220,132,0.15);color:#3ddc84':
        earned===0?'background:rgba(255,95,87,0.12);color:#ff5f57':
                   'background:rgba(240,208,80,0.15);color:var(--accent)'
      }">+${earned}</span>`:'<span style="color:var(--text3);font-size:13px">—</span>'}</div>
    </div>`;
  });
  if(lastPhase) html+='</div>';
  el.innerHTML=html||'<p class="empty">No matches for this filter.</p>';
}

function renderSpecial(){
  const el=document.getElementById('special-content');
  if(!el) return;
  if(!data){el.innerHTML='<div class="no-snapshot">No data yet.</div>';return;}
  const scorer=(data.results?._scorer||'').toLowerCase().trim();
  const winner=(data.results?._winner||'').toLowerCase().trim();
  let html='';
  (data.players||[]).forEach(player=>{
    const sp=data.special?.[player];if(!sp)return;
    html+=`<div class="card"><div class="card-title" style="display:flex;align-items:center;gap:8px;">${typeof AVATARS !== 'undefined' && AVATARS[player]?`<img class="avatar-sm" src="${AVATARS[player]}" alt="">`:''}<span>${escHtml(player)}</span></div>
    <div class="special-block"><div class="special-block-title">First scorer picks${scorer?` <span style="color:var(--text3);font-size:10px;text-transform:none;letter-spacing:0;font-weight:400">· actual: ${escHtml(data.results._scorer)}</span>`:''}</div>
    ${sp.scorer.map(x=>{const won=scorer&&(x.pick||'').toLowerCase().trim()===scorer;return`<div class="pick-row"><span class="pick-name">${escHtml(x.pick)||'<span style="color:var(--text3)">—</span>'}</span><span class="pick-pts${won?' won':''}">${won?'+':''}${x.pts||0}${won?' ✓':''}</span></div>`;}).join('')}</div>
    <div class="special-block"><div class="special-block-title">Tournament winner picks${winner?` <span style="color:var(--text3);font-size:10px;text-transform:none;letter-spacing:0;font-weight:400">· actual: ${escHtml(data.results._winner)}</span>`:''}</div>
    ${sp.winner.map(x=>{const won=winner&&(x.pick||'').toLowerCase().trim()===winner;return`<div class="pick-row"><span class="pick-name">${escHtml(x.pick)||'<span style="color:var(--text3)">—</span>'}</span><span class="pick-pts${won?' won':''}">${won?'+':''}${x.pts||0}${won?' ✓':''}</span></div>`;}).join('')}</div>
    </div>`;
  });
  el.innerHTML=html||'<p class="empty">No special event data yet.</p>';
}
